# Postgres local (dev) — alinhado ao default em apps/api/.env.example
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sitecompras
    volumes:
      - sitecompras_pgdata:/var/lib/postgresql/data

volumes:
  sitecompras_pgdata:
