name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build web estático (igual ao Render Static Site)
        env:
          NEXT_STATIC_EXPORT: "1"
          NEXT_PUBLIC_API_URL: https://sistemas-compra.onrender.com/api
        run: npm run build:static -w apps/web
