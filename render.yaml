services:
  - type: web
    name: sitecompras-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npm run db:generate && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: UPLOADS_DIR
        value: /var/data/uploads
    disk:
      name: uploads
      mountPath: /var/data/uploads
      sizeGB: 1
